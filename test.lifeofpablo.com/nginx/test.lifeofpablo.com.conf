server {
    listen 80;
    server_name test.lifeofpablo.com;
    root /var/www/html;
    index yellow.php index.html;

    # 1. Security: Block system folders properly
    # Using 'return 403' is cleaner than a rewrite to /error
    location ~ ^/(content|system)/ {
        return 403;
    }

    # 2. robots.txt
    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    # 3. Main Logic (Replaces the 'if' block)
    location / {
        try_files $uri $uri/ /yellow.php?$args;
    }

    # 4. PHP Processing
    location ~ \.php$ {
        include fastcgi_params; # Ensure this file exists
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index yellow.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # 5. Bot Blocking (Kept here for simplicity, but consider 'map' later)
    if ($http_user_agent ~* "AhrefsBot|SemrushBot|Bytespider|...[rest of your bots]...") {
        return 403;
    }
}