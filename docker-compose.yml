services:
  reverse-proxy:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false" # Only expose containers with traefik.enable=true
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${DEFAULT_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro # Read-only for security
    networks:
      - web_network
    restart: unless-stopped

  # --- DATABASES (Internal Only) ---
  mariadb:
    image: mariadb:11
    container_name: mariadb
    command: --max-allowed-packet=64MB
    restart: always
    volumes:
      - mariadb_data:/var/lib/mysql:Z
    environment:
      - MYSQL_ROOT_PASSWORD
      - MARIADB_AUTO_UPGRADE=1
      - TZ=America/Los_Angeles
    networks:
      - web_network

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=miniflux
      - POSTGRES_PASSWORD=${FRESHRSS_MYSQL_PASSWORD}
      - POSTGRES_DB=miniflux
    volumes:
      - miniflux_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "miniflux"]
      interval: 10s
      start_period: 30s
    networks:
      - web_network

  # --- AUTHENTICATION ---
  vouch-proxy:
    container_name: vouch-proxy
    image: quay.io/vouch/vouch-proxy:alpine-master
    restart: always
    environment:
      - VOUCH_DOMAINS
      - OAUTH_PROVIDER=${VOUCH_OAUTH_PROVIDER}
      - OAUTH_CLIENT_ID=${VOUCH_OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${VOUCH_OAUTH_CLIENT_SECRET}
      - OAUTH_CALLBACK_URL=${VOUCH_OAUTH_CALLBACK_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vouch.rule=Host(`auth.lifeofpablo.com`)"
      - "traefik.http.routers.vouch.entrypoints=websecure"
      - "traefik.http.routers.vouch.tls.certresolver=myresolver"
      - "traefik.http.middlewares.vouch-auth.forwardauth.address=http://vouch-proxy:9090/validate"
      - "traefik.http.middlewares.vouch-auth.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.vouch-auth.forwardauth.authResponseHeaders=X-Vouch-User"
    networks:
      - web_network

  # --- APPLICATIONS ---
  miniflux:
    image: miniflux/miniflux:2.2.19
    container_name: miniflux
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://miniflux:${FRESHRSS_MYSQL_PASSWORD}@postgres/miniflux?sslmode=disable
      - RUN_MIGRATIONS=1
      - BASE_URL=https://reader.lifeofpablo.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.miniflux.rule=Host(`reader.lifeofpablo.com`)"
      - "traefik.http.routers.miniflux.entrypoints=websecure"
      - "traefik.http.routers.miniflux.tls.certresolver=myresolver"
      # Protected by Vouch middleware
      - "traefik.http.routers.miniflux.middlewares=vouch-auth"
    networks:
      - web_network

  wishlist:
    container_name: wishlist
    image: ghcr.io/cmintey/wishlist:v0.62.0
    volumes:
      - ./wishlist/uploads:/usr/src/app/uploads
      - ./wishlist/data:/usr/src/app/data
    environment:
      ORIGIN: https://wishlist.lifeofpablo.com
      TOKEN_TIME: 72
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wishlist.rule=Host(`wishlist.lifeofpablo.com`)"
      - "traefik.http.routers.wishlist.entrypoints=websecure"
      - "traefik.http.routers.wishlist.tls.certresolver=myresolver"
    networks:
      - web_network

  yourls:
    image: yourls:1.10
    container_name: yourls
    restart: always
    environment:
      YOURLS_DB_HOST: mariadb
      YOURLS_DB_USER: ${YOURLS_DB_USER}
      YOURLS_DB_PASS: ${YOURLS_DB_PASS}
      YOURLS_SITE: https://pabs.lol
      YOURLS_USER: ${YOURLS_USER}
      YOURLS_PASS: ${YOURLS_PASS}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yourls.rule=Host(`pabs.lol`)"
      - "traefik.http.routers.yourls.entrypoints=websecure"
      - "traefik.http.routers.yourls.tls.certresolver=myresolver"
    networks:
      - web_network

  # --- STATIC SITES & PROXIES ---
  lifeofpablo:
    container_name: lifeofpablo
    restart: always
    build:
      context: ./lifeofpablo.com
      dockerfile: Dockerfile
    volumes:
      - ./lifeofpablo.com/www:/var/www/html
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lifeofpablo.rule=Host(`lifeofpablo.com`)"
      - "traefik.http.routers.lifeofpablo.entrypoints=websecure"
      - "traefik.http.routers.lifeofpablo.tls.certresolver=myresolver"
    networks:
      - web_network

  it-tools:
    image: 'corentinth/it-tools:latest'
    container_name: it-tools
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.it-tools.rule=Host(`it-tools.lifeofpablo.com`)"
      - "traefik.http.routers.it-tools.entrypoints=websecure"
      - "traefik.http.routers.it-tools.tls.certresolver=myresolver"
    networks:
      - web_network

  pabs-api:
    container_name: pabs-api
    build: ./pabs-api
    environment:
      - NODE_ENV=production
      - API_DB_HOST=mariadb
      - API_DB_USER
      - API_DB_PASS
      - API_DB
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pabs-api.rule=Host(`api.lifeofpablo.com`)"
      - "traefik.http.routers.pabs-api.entrypoints=websecure"
      - "traefik.http.routers.pabs-api.tls.certresolver=myresolver"
    networks:
      - web_network

networks:
  web_network:
    driver: bridge

volumes:
  mariadb_data:
  miniflux_db_data:
  letsencrypt: