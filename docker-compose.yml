services:
  reverse-proxy:
    image: traefik:v3.0 # Explicitly use v3 for better performance
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false" # Security: Only expose labeled services
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=${DEFAULT_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro # Read-only for security
    networks:
      - app_network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=miniflux
      - POSTGRES_PASSWORD=${FRESHRSS_MYSQL_PASSWORD}
      - POSTGRES_DB=miniflux
    volumes:
      - miniflux-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "miniflux"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  miniflux:
    image: miniflux/miniflux:2.2.19
    container_name: miniflux
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://miniflux:${FRESHRSS_MYSQL_PASSWORD}@postgres/miniflux?sslmode=disable
      - RUN_MIGRATIONS=1
      - BASE_URL=https://reader.lifeofpablo.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.miniflux.rule=Host(`reader.lifeofpablo.com`)"
      - "traefik.http.routers.miniflux.entrypoints=websecure"
      - "traefik.http.routers.miniflux.tls.certresolver=myresolver"
      - "traefik.http.services.miniflux.loadbalancer.server.port=8080"
    networks:
      - app_network

  mariadb:
    image: mariadb:11
    container_name: mariadb
    command: --max-allowed-packet=64MB
    restart: always
    volumes:
      - mariadb_data:/var/lib/mysql:Z
    environment:
      - MYSQL_ROOT_PASSWORD
      - MARIADB_AUTO_UPGRADE=1
      - TZ=America/Los_Angeles
    networks:
      - app_network

  yourls:
    image: yourls:1.10
    container_name: yourls
    restart: always
    environment:
      YOURLS_DB_HOST: mariadb
      YOURLS_DB_USER: ${YOURLS_DB_USER}
      YOURLS_DB_PASS: ${YOURLS_DB_PASS}
      YOURLS_SITE: https://pabs.lol
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yourls.rule=Host(`pabs.lol`)"
      - "traefik.http.routers.yourls.entrypoints=websecure"
      - "traefik.http.routers.yourls.tls.certresolver=myresolver"
    networks:
      - app_network

  # ... [Apply similar network/label patterns to your other apps] ...

networks:
  app_network:
    driver: bridge

volumes:
  mariadb_data:
  miniflux-db:
  letsencrypt: