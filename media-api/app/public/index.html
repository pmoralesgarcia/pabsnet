<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Vault Pro v1</title>
    <style>
        :root { --success: #27ae60; --danger: #e74c3c; --accent: #3498db; }
        body { font-family: sans-serif; padding: 10px; margin: 0; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        
        /* Navigation & Inputs */
        .nav { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        input, button { padding: 10px; border-radius: 4px; border: 1px solid #ddd; width: 100%; }
        button { cursor: pointer; border: none; color: white; background: var(--accent); }
        
        /* Responsive Table */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        
        @media (max-width: 600px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { border: 1px solid #ddd; margin-bottom: 15px; padding: 10px; border-radius: 5px; }
            td { text-align: right; padding-left: 50%; position: relative; }
            td::before { content: attr(data-label); position: absolute; left: 10px; font-weight: bold; }
        }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; width: 90%; max-width: 500px; border-radius: 8px; position: relative; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 480px) { .info-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div id="login-view">
        <h2 style="text-align:center">Vault Login</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" style="margin-top:10px" placeholder="Password">
        <button onclick="login()" style="margin-top:15px">Login</button>
    </div>

    <div id="main-view" class="hidden">
        <div class="nav">
            <button class="btn-tab" id="tab-vinyls" onclick="switchTab('vinyls')">Vinyls</button>
            <button class="btn-tab" id="tab-cds" onclick="switchTab('cds')">CDs</button>
            <button class="btn-tab" id="tab-dvds" onclick="switchTab('dvds')">DVDs</button>
            <button onclick="logout()" style="background:#95a5a6">Logout</button>
        </div>
        <input type="text" id="search" placeholder="Filter..." style="margin-bottom:15px" oninput="loadData()">
        <button onclick="openForm()" style="background:var(--success); margin-bottom:15px">+ Add New</button>
        <table>
            <thead><tr><th>Title</th><th>Artist</th><th>Year</th><th>Action</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<div id="modal" class="modal-overlay hidden">
    <div class="modal-content">
        <button onclick="closeModal()" style="background:var(--danger); width: auto; position: absolute; top:10px; right:10px;">Close</button>
        <div id="view-mode">
            <h2 id="v-title"></h2>
            <p id="v-artist"></p>
            <div id="v-grid" class="info-grid"></div>
            <button onclick="toggleMode('edit')" style="margin-top:15px">Edit</button>
        </div>
        <div id="edit-mode" class="hidden">
            <h3>Edit Entry</h3>
            <div class="info-grid">
                <input type="text" data-key="title" placeholder="Title">
                <input type="text" data-key="artist" placeholder="Artist">
                <input type="text" data-key="genre" placeholder="Genre">
                <input type="number" data-key="copyright_year" placeholder="Year">
            </div>
            <button onclick="saveEntry()" style="background:var(--success); margin-top:15px">Save</button>
        </div>
    </div>
</div>

<script>
    let currentTab = 'vinyls', editId = null;
    const fields = ['genre', 'copyright_year', 'label'];

    async function login() {
        const res = await fetch('/api/v1/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: document.getElementById('u').value, password: document.getElementById('p').value })
        }).then(r => r.json());
        if(res.status === "success") { localStorage.setItem('token', res.data.token); location.reload(); }
        else alert(res.message);
    }

    async function loadData() {
        const q = document.getElementById('search').value;
        const res = await fetch(`/api/v1/${currentTab}?search=${q}`, { headers: {'Authorization': localStorage.getItem('token')} }).then(r => r.json());
        if(res.status === "success") {
            document.getElementById('table-body').innerHTML = res.data.map(item => `
                <tr>
                    <td data-label="Title"><b>${item.title}</b></td>
                    <td data-label="Artist">${item.artist}</td>
                    <td data-label="Year">${item.copyright_year}</td>
                    <td data-label="Action"><button onclick="deleteItem(${item.id})" style="background:var(--danger)">Del</button></td>
                </tr>`).join('');
        }
    }

    function switchTab(t) { currentTab = t; loadData(); }
    function logout() { localStorage.removeItem('token'); location.reload(); }
    function openForm() { document.getElementById('modal').classList.remove('hidden'); toggleMode('edit'); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    function toggleMode(m) {
        document.getElementById('view-mode').classList.toggle('hidden', m === 'edit');
        document.getElementById('edit-mode').classList.toggle('hidden', m === 'view');
    }
    
    window.onload = () => { if(localStorage.getItem('token')) { document.getElementById('login-view').classList.add('hidden'); document.getElementById('main-view').classList.remove('hidden'); loadData(); } };
</script>
</body>
</html>
